<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC 员工打卡点探索</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      background: #f3f8f5;
      color: #1f2937;
    }

    .container {
      width: min(1100px, 94vw);
      margin: 20px auto 50px;
    }

    .hero {
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 14px 36px rgba(0, 90, 45, 0.15);
      margin-bottom: 24px;
    }

    .image-box {
      width: 100%;
      min-height: 220px;
      background: linear-gradient(135deg, #e8fff0, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #d9e7df;
    }

    .image-box img {
      width: 100%;
      max-height: 520px;
      object-fit: contain;
      display: block;
    }

    .image-fallback {
      padding: 60px 20px;
      text-align: center;
      color: #00a651;
      font-size: 30px;
      font-weight: bold;
    }

    .hero-content {
      padding: 24px;
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 20px;
      align-items: center;
    }

    h1 {
      font-size: clamp(28px, 4vw, 44px);
      color: #11412a;
      margin-bottom: 12px;
    }

    .subtitle {
      color: #6b7280;
      line-height: 1.7;
      font-size: 15px;
    }

    .current-chip {
      display: inline-block;
      margin-top: 14px;
      padding: 9px 15px;
      border-radius: 999px;
      background: #e9fff1;
      color: #067a3f;
      font-weight: 800;
      border: 1px solid #bfeacd;
    }

    .login-card {
      background: linear-gradient(145deg, #ffffff, #f2fff6);
      border: 1px solid #caead6;
      border-radius: 20px;
      padding: 18px;
    }

    .login-title {
      font-weight: 900;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .name-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 180px;
      height: 46px;
      border: 1px solid #d9e7df;
      border-radius: 14px;
      padding: 0 14px;
      outline: none;
      font-size: 16px;
    }

    input:focus {
      border-color: #00a651;
      box-shadow: 0 0 0 4px rgba(0, 166, 81, 0.12);
    }

    button {
      height: 46px;
      border: none;
      border-radius: 14px;
      padding: 0 18px;
      background: #00a651;
      color: white;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #067a3f;
      transform: translateY(-1px);
    }

    .welcome {
      display: none;
      margin-top: 12px;
      color: #14532d;
      font-weight: 800;
    }

    .welcome span {
      color: #00a651;
    }

    .notice {
      margin-top: 10px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
    }

    .progress-card {
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-weight: 900;
      font-size: 20px;
    }

    .progress-num {
      color: #067a3f;
    }

    .progress-track {
      height: 24px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00a651, #62df87, #ffe680);
      border-radius: inherit;
      transition: 0.35s;
    }

    .section-title {
      margin-bottom: 14px;
    }

    .section-title h2 {
      font-size: 24px;
      color: #123d29;
    }

    .section-title p {
      color: #6b7280;
      font-size: 14px;
      margin-top: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 14px;
    }
