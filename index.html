<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>举手文化成果打卡寻宝-1</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      background: #f3f8f5;
      color: #1f2937;
    }

    .container {
      width: min(1180px, 94vw);
      margin: 24px auto 50px;
    }

    .hero {
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 14px 36px rgba(0, 90, 45, 0.15);
      margin-bottom: 24px;
    }

    .image-box {
      width: 100%;
      background: #101010;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #d9e7df;
      overflow: hidden;
    }

    .image-box img {
      width: 100%;
      max-height: 680px;
      object-fit: contain;
      display: block;
      background: #101010;
    }

    .hero-content {
      padding: 24px;
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 20px;
      align-items: center;
    }

    h1 {
      font-size: clamp(28px, 4vw, 44px);
      color: #06422a;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .subtitle {
      color: #4b5563;
      line-height: 1.7;
      font-size: 15px;
    }

    .current-chip {
      display: inline-block;
      margin-top: 14px;
      padding: 9px 15px;
      border-radius: 999px;
      background: #e9fff1;
      color: #067a3f;
      font-weight: 900;
      border: 1px solid #bfeacd;
    }

    .login-card {
      background: linear-gradient(145deg, #ffffff, #f2fff6);
      border: 1px solid #caead6;
      border-radius: 20px;
      padding: 18px;
    }

    .login-title {
      font-weight: 900;
      font-size: 18px;
      margin-bottom: 12px;
      color: #0f3f2b;
    }

    .name-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 180px;
      height: 46px;
      border: 1px solid #d9e7df;
      border-radius: 14px;
      padding: 0 14px;
      outline: none;
      font-size: 16px;
      background: #ffffff;
    }

    input:focus {
      border-color: #00a651;
      box-shadow: 0 0 0 4px rgba(0, 166, 81, 0.12);
    }

    button {
      height: 46px;
      border: none;
      border-radius: 14px;
      padding: 0 18px;
      background: #00a651;
      color: white;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #067a3f;
      transform: translateY(-1px);
    }

    .welcome {
      display: none;
      margin-top: 12px;
      color: #14532d;
      font-weight: 800;
    }

    .welcome span {
      color: #00a651;
    }

    .notice {
      margin-top: 10px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
    }

    .progress-card {
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-weight: 900;
      font-size: 20px;
    }

    .progress-num {
      color: #067a3f;
    }

    .progress-track {
      height: 24px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00a651, #62df87, #ffe680);
      border-radius: inherit;
      transition: 0.35s;
    }

    .section-title {
      margin-bottom: 18px;
    }

    .section-title h2 {
      font-size: 26px;
      color: #06422a;
      margin-bottom: 6px;
    }

    .section-title p {
      color: #6b7280;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(125px, 1fr));
      gap: 22px;
      align-items: center;
    }

    .point {
      position: relative;
      width: 125px;
      height: 125px;
      margin: 0 auto;
      border-radius: 24px;
      transition: 0.25s ease;
      filter: grayscale(100%) opacity(0.45);
      transform: scale(0.96);
    }

    .point-icon {
      width: 100%;
      height: 100%;
      background-image: url("./icon.jpg");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      position: relative;
    }

    .point-number {
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      font-size: 38px;
      font-weight: 1000;
      color: #ffffff;
      text-shadow:
        0 2px 3px rgba(0, 0, 0, 0.65),
        0 0 8px rgba(0, 0, 0, 0.6);
      z-index: 2;
      line-height: 1;
    }

    .point-label {
      position: absolute;
      left: 50%;
      bottom: 9px;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 900;
      color: #ffffff;
      text-shadow:
        0 1px 3px rgba(0, 0, 0, 0.75),
        0 0 6px rgba(0, 0, 0, 0.65);
      white-space: nowrap;
      z-index: 2;
    }

    .point.active {
      filter: grayscale(0%) opacity(1);
      transform: scale(1.05);
      animation: glowPulse 1.8s infinite;
    }

    .point.active::after {
      content: "已点亮";
      position: absolute;
      right: -6px;
      top: -6px;
      font-size: 11px;
      padding: 5px 8px;
      border-radius: 999px;
      color: white;
      background: #00a651;
      box-shadow: 0 5px 14px rgba(0, 166, 81, 0.35);
      z-index: 3;
      font-weight: 900;
    }

    @keyframes glowPulse {
      0% {
        filter: grayscale(0%) opacity(1)
          drop-shadow(0 0 8px rgba(0, 166, 81, 0.45));
      }
      50% {
        filter: grayscale(0%) opacity(1)
          drop-shadow(0 0 20px rgba(0, 166, 81, 0.85));
      }
      100% {
        filter: grayscale(0%) opacity(1)
          drop-shadow(0 0 8px rgba(0, 166, 81, 0.45));
      }
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .secondary {
      background: #eef7f1;
      color: #067a3f;
      border: 1px solid #c8e9d4;
    }

    .danger {
      background: #fff1f2;
      color: #be123c;
      border: 1px solid #fecdd3;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: #111827;
      color: white;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      transition: 0.3s;
      z-index: 99;
      max-width: 92vw;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: none;
      z-index: 80;
    }

    .confetti.show {
      display: block;
    }

    .confetti i {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 16px;
      animation: fall 2.5s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(105vh) rotate(720deg);
        opacity: 0.85;
      }
    }

    @media (max-width: 800px) {
      .hero-content {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
      }

      .point {
        width: 86px;
        height: 86px;
        border-radius: 18px;
      }

      .point-number {
        font-size: 27px;
      }

      .point-label {
        font-size: 10px;
        bottom: 5px;
      }

      .point.active::after {
        display: none;
      }
    }

    @media (max-width: 430px) {
      .container {
        width: 96vw;
        margin-top: 12px;
      }

      .hero {
        border-radius: 18px;
      }

      .hero-content {
        padding: 18px;
      }

      .grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .point {
        width: 76px;
        height: 76px;
      }

      .point-number {
        font-size: 24px;
      }

      input,
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="toast" id="toast"></div>
  <div class="confetti" id="confetti"></div>

  <main class="container">
    <section class="hero">
<div class="image-box">
./banner1.jpg
</div>

      <div class="hero-content">
        <div>
          <h1>举手文化成果打卡寻宝-1</h1>
          <p class="subtitle">
            每个现场打卡点都有自己的编号。员工用手机 NFC 触碰对应点位后，网页会识别当前点位编号；输入姓名后，该员工已找到的编号会持续点亮。
          </p>
          <div class="current-chip" id="currentChip">当前 NFC 点位：未识别</div>
        </div>

        <div class="login-card">
          <div class="login-title">请输入员工姓名</div>
          <div class="name-row">
            <input id="employeeName" type="text" maxlength="30" placeholder="例如：张三">
            <button id="submitBtn">确认打卡</button>
          </div>
          <div class="welcome" id="welcomeText"></div>
          <div class="notice">
            同一位员工请每次输入相同姓名；打卡进度会保存在该员工自己的手机浏览器中。
          </div>
        </div>
      </div>
    </section>

    <section class="progress-card">
      <div class="progress-head">
        <div>打卡进度</div>
        <div class="progress-num">
          <span id="doneCount">0</span>/20
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </section>

    <section>
      <div class="section-title">
        <h2>20 个打卡点</h2>
        <p>已经找到的编号会变亮，未找到的编号保持暗色。</p>
      </div>

      <div class="grid" id="pointsGrid"></div>

      <div class="actions">
        <button class="secondary" id="changeNameBtn">更换姓名</button>
        <button class="danger" id="clearBtn">清空当前姓名记录</button>
      </div>
    </section>
  </main>

  <script>
    const TOTAL_POINTS = 20;

    const qs = new URLSearchParams(window.location.search);
    const currentPoint = Number(qs.get("point"));
    const validCurrentPoint =
      Number.isInteger(currentPoint) &&
      currentPoint >= 1 &&
      currentPoint <= TOTAL_POINTS;

    const el = function(id) {
      return document.getElementById(id);
    };

    function normalizeName(name) {
      return name.trim().replace(/\s+/g, " ").toLowerCase();
    }

    function storageKeyForName(name) {
      return "nfc_checkin_progress_" + encodeURIComponent(normalizeName(name));
    }

    function getProgress(name) {
      if (!name) return [];

      try {
        const raw = localStorage.getItem(storageKeyForName(name));
        const arr = raw ? JSON.parse(raw) : [];

        if (!Array.isArray(arr)) return [];

        return arr.filter(function(n) {
          return Number.isInteger(n) && n >= 1 && n <= TOTAL_POINTS;
        });
      } catch (e) {
        return [];
      }
    }

    function saveProgress(name, points) {
      const unique = Array.from(new Set(points)).sort(function(a, b) {
        return a - b;
      });

      localStorage.setItem(storageKeyForName(name), JSON.stringify(unique));
      localStorage.setItem("nfc_checkin_last_name", name.trim());
    }

    function toast(message) {
      el("toast").textContent = message;
      el("toast").classList.add("show");

      setTimeout(function() {
        el("toast").classList.remove("show");
      }, 2300);
    }

    function renderPoints(activePoints) {
      const grid = el("pointsGrid");
      grid.innerHTML = "";

      for (let i = 1; i <= TOTAL_POINTS; i++) {
        const card = document.createElement("div");
        card.className = activePoints.includes(i) ? "point active" : "point";

        card.innerHTML =
          '<div class="point-icon">' +
            '<div class="point-number">' + i + '</div>' +
            '<div class="point-label">打卡点</div>' +
          '</div>';

        grid.appendChild(card);
      }
    }

    function renderProgress(activePoints) {
      const count = activePoints.length;
      el("doneCount").textContent = count;
      el("progressBar").style.width = (count / TOTAL_POINTS) * 100 + "%";
    }

    function displayName(name) {
      return name.replace(/[&<>"']/g, function(ch) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[ch];
      });
    }

    function renderByName(name) {
      const points = getProgress(name);

      renderPoints(points);
      renderProgress(points);

      if (name) {
        el("welcomeText").style.display = "block";
        el("welcomeText").innerHTML =
          "当前员工：<span>" + displayName(name) + "</span>";
      } else {
        el("welcomeText").style.display = "none";
      }
    }

    function submitCheckin() {
      const name = el("employeeName").value.trim();

      if (!name) {
        toast("请先输入员工姓名");
        return;
      }

      let points = getProgress(name);
      let message = "";

      if (validCurrentPoint) {
        if (!points.includes(currentPoint)) {
          points.push(currentPoint);
          saveProgress(name, points);
          message = "✅ " + name + " 已点亮打卡点 " + currentPoint;
        } else {
          saveProgress(name, points);
          message = "打卡点 " + currentPoint + " 已经点亮过";
        }
      } else {
        saveProgress(name, points);
        message = "已显示 " + name + " 的打卡进度";
      }

      renderByName(name);
      toast(message);

      if (getProgress(name).length === TOTAL_POINTS) {
        celebrate();
      }
    }

    function clearCurrentNameProgress() {
      const name = el("employeeName").value.trim();

      if (!name) {
        toast("请先输入要清空记录的姓名");
        return;
      }

      localStorage.removeItem(storageKeyForName(name));
      renderByName(name);
      toast("已清空 " + name + " 的打卡记录");
    }

    function celebrate() {
      const c = el("confetti");

      if (c.classList.contains("show")) return;

      c.innerHTML = "";
      c.classList.add("show");

      const colors = ["#00A651", "#6ee787", "#ffe680", "#38bdf8", "#fb7185"];

      for (let i = 0; i < 90; i++) {
        const piece = document.createElement("i");

        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.8 + "s";
        piece.style.transform = "rotate(" + Math.random() * 180 + "deg)";

        c.appendChild(piece);
      }

      toast("🎉 恭喜，20 个打卡点已全部完成！");

      setTimeout(function() {
        c.classList.remove("show");
      }, 3400);
    }

    function init() {
      if (validCurrentPoint) {
        el("currentChip").textContent = "当前 NFC 点位：" + currentPoint;
      } else {
        el("currentChip").textContent = "当前 NFC 点位：未识别";
      }

      renderPoints([]);
      renderProgress([]);

      const lastName = localStorage.getItem("nfc_checkin_last_name") || "";

      if (lastName) {
        el("employeeName").value = lastName;
        renderByName(lastName);
      }

      if (validCurrentPoint && lastName) {
        let points = getProgress(lastName);

        if (!points.includes(currentPoint)) {
          points.push(currentPoint);
          saveProgress(lastName, points);
          renderByName(lastName);
          toast("✅ 已自动点亮打卡点 " + currentPoint);
        }
      }
    }

    el("submitBtn").addEventListener("click", submitCheckin);

    el("employeeName").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        submitCheckin();
      }
    });

    el("changeNameBtn").addEventListener("click", function() {
      el("employeeName").value = "";
      el("employeeName").focus();
      renderByName("");
      toast("请输入新的员工姓名");
    });

    el("clearBtn").addEventListener("click", clearCurrentNameProgress);

    init();
  </script>
</body>
</html>
