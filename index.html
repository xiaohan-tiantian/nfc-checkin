<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>举手文化成果打卡寻宝-1</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      background: #f3f8f5;
      color: #1f2937;
    }

    .container {
      width: min(1180px, 94vw);
      margin: 24px auto 50px;
    }

    .hero {
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 14px 36px rgba(0, 90, 45, 0.15);
      margin-bottom: 24px;
    }

    .image-box {
      width: 100%;
      background: #101010;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #d9e7df;
      overflow: hidden;
    }

    .image-box img {
      width: 100%;
      max-height: 680px;
      object-fit: contain;
      display: block;
      background: #101010;
    }

    .hero-content {
      padding: 24px;
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 20px;
      align-items: center;
    }

    h1 {
      font-size: clamp(28px, 4vw, 44px);
      color: #06422a;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .subtitle {
      color: #4b5563;
      line-height: 1.7;
      font-size: 15px;
    }

    .current-chip {
      display: inline-block;
      margin-top: 14px;
      padding: 9px 15px;
      border-radius: 999px;
      background: #e9fff1;
      color: #067a3f;
      font-weight: 900;
      border: 1px solid #bfeacd;
    }

      background: linear-gradient(145deg, #ffffff, #f2fff6);
      border: 1px solid #caead6;
      border-radius: 20px;
